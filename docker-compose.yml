services:
  database:
    image: mariadb:10.11
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./database:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    image: local/pterodactyl-panel-with-mysql:latest
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "${PANEL_HTTP_PORT}:80"
    extra_hosts:
      - "${PANEL_HOST}:${WINGS_CONTAINER_IP}"
    networks:
      default:
        ipv4_address: ${PANEL_CONTAINER_IP}
    environment:
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE}
      APP_SERVICE_AUTHOR: ${PANEL_EMAIL}
      APP_ENV: production
      APP_ENVIRONMENT_ONLY: "false"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_DRIVER: redis
      REDIS_HOST: cache
      DB_HOST: database
      DB_PORT: ${DB_PORT}
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_FROM: ${PANEL_EMAIL}
      MAIL_DRIVER: smtp
      MAIL_HOST: 127.0.0.1
      MAIL_PORT: "1025"
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_ENCRYPTION: "false"
    volumes:
      - ./var:/app/var
      - ./nginx:/etc/nginx/http.d
      - ./certs:/etc/letsencrypt
      - ./logs:/app/storage/logs

  wings:
    image: ghcr.io/pterodactyl/wings:latest
    restart: unless-stopped
    depends_on:
      - panel
    ports:
      - "${WINGS_API_PORT}:8080"
      - "${WINGS_SFTP_PORT}:2022"
    extra_hosts:
      - "${PANEL_HOST}:${PANEL_CONTAINER_IP}"
    networks:
      default:
        ipv4_address: ${WINGS_CONTAINER_IP}
    tty: true
    environment:
      TZ: ${APP_TIMEZONE}
      WINGS_UID: ${WINGS_UID}
      WINGS_GID: ${WINGS_GID}
      WINGS_USERNAME: ${WINGS_USERNAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers
      - ./etc:/etc/pterodactyl
      - ./var-lib:/var/lib/pterodactyl
      - ./var-log:/var/log/pterodactyl
      - ./tmp:/tmp/pterodactyl
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - /run/wings:/run/wings

networks:
  default:
    name: pterodactyl-net
    ipam:
      config:
        - subnet: ${COMPOSE_SUBNET}
